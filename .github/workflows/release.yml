name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump when version is empty"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Optional exact version, for example 0.2.0 or v0.2.0"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Bump, build, and publish APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Decode release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${ANDROID_KEYSTORE_BASE64}" ]]; then
            echo "ANDROID_KEYSTORE_BASE64 is not set; release APK will be unsigned."
            exit 0
          fi

          keystore="${RUNNER_TEMP}/magicbox-release.jks"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore}"
          echo "ANDROID_KEYSTORE_FILE=${keystore}" >> "${GITHUB_ENV}"

      - name: Resolve release version
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          read_prop() {
            sed -n "s/^$1=//p" gradle.properties | head -n 1
          }

          validate_version() {
            local value="$1"
            if [[ ! "${value}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Version must look like 0.1.0" >&2
              exit 1
            fi
          }

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
              echo "Tag must look like v0.1.0" >&2
              exit 1
            fi
            version="${tag#v}"
            version_code="$(read_prop project.version.code)"
            target="${GITHUB_SHA}"
          else
            git fetch --tags --force

            requested="${INPUT_VERSION#v}"
            if [[ -n "${requested}" ]]; then
              version="${requested}"
              validate_version "${version}"
            else
              latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
              if [[ -n "${latest_tag}" ]]; then
                base="${latest_tag#v}"
              else
                base="$(read_prop project.version.name)"
              fi
              validate_version "${base}"

              IFS='.' read -r major minor patch_extra <<< "${base}"
              patch="${patch_extra%%[-+]*}"
              case "${INPUT_BUMP}" in
                major)
                  major=$((major + 1))
                  minor=0
                  patch=0
                  ;;
                minor)
                  minor=$((minor + 1))
                  patch=0
                  ;;
                patch)
                  patch=$((patch + 1))
                  ;;
                *)
                  echo "Unsupported bump: ${INPUT_BUMP}" >&2
                  exit 1
                  ;;
              esac
              version="${major}.${minor}.${patch}"
            fi

            tag="v${version}"
            if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
              echo "Tag already exists: ${tag}" >&2
              exit 1
            fi

            current_code="$(read_prop project.version.code)"
            version_code=$((current_code + 1))

            sed -i \
              -e "s/^project.version.name=.*/project.version.name=${version}/" \
              -e "s/^project.version.code=.*/project.version.code=${version_code}/" \
              gradle.properties

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gradle.properties
            git commit -m "Release ${tag}"
            target="$(git rev-parse HEAD)"
            branch="${GITHUB_REF_NAME}"
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "version_code=${version_code}" >> "${GITHUB_OUTPUT}"
          echo "target=${target}" >> "${GITHUB_OUTPUT}"
          echo "branch=${branch:-}" >> "${GITHUB_OUTPUT}"

      - name: Build APKs
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assemble --stacktrace

      - name: Push version bump
        if: github.event_name == 'workflow_dispatch'
        run: git push origin "HEAD:${{ steps.release.outputs.branch }}"

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          mkdir -p release
          apks=(app/build/outputs/apk/**/*.apk)
          if (( ${#apks[@]} == 0 )); then
            echo "No APKs were produced" >&2
            exit 1
          fi

          for apk in "${apks[@]}"; do
            name="$(basename "${apk}")"
            variant="${name#app-}"
            variant="${variant%.apk}"
            cp "${apk}" "release/MagicBox-${{ steps.release.outputs.tag }}-${{ steps.release.outputs.version_code }}-${variant}.apk"
          done
          ls -lh release

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          notes="MagicBox Android frontend APK for the MagicNet Magisk module backend.

Version: ${{ steps.release.outputs.version }}
Version code: ${{ steps.release.outputs.version_code }}"

          if gh release view "${{ steps.release.outputs.tag }}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${{ steps.release.outputs.tag }}" release/*.apk \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${{ steps.release.outputs.tag }}" \
              release/*.apk \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${{ steps.release.outputs.target }}" \
              --title "MagicBox ${{ steps.release.outputs.tag }}" \
              --notes "${notes}" \
              "${args[@]}"
          fi
