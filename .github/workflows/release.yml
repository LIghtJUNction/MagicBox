name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.tag_name }}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must look like v0.1.0" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/MagicBox-${{ steps.release.outputs.tag }}-debug.apk"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          args=()
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${{ steps.release.outputs.tag }}" \
            release/*.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --title "MagicBox ${{ steps.release.outputs.tag }}" \
            --notes "MagicBox Android frontend APK for the MagicNet Magisk module backend." \
            "${args[@]}"
